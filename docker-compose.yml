services:
  backend:
    build:
      context: ./backend_ticketing
      dockerfile: Dockerfile
    image: ticketing_backend
    ports:
      - "${PORT}:${PORT}"
    environment:
      - PORT=${PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Seed automático de datos de prueba. Solo seedea si la base aún no tiene
  # datos bulk (SEED_SKIP_IF_EXISTS=1), así corre efectivamente la primera vez.
  seeder:
    image: ticketing_backend
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - DB_NAME=${DB_NAME}
      - SEED_SKIP_IF_EXISTS=1
    volumes:
      - ./backend_ticketing/scripts:/app/scripts:ro
    working_dir: /app
    command: ["node", "scripts/seed-masivo.mjs"]
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    restart: "no"

  db:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
